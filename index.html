<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renita's Palace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="label">Voor jou ❤️</p>
      <h1>Renita's Palace</h1>
      <p class="subtitle">Een klein plekje waar je mijn planning en updates kunt zien.</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>Nu bezig met</h2>
        <p id="statusText">Even opstarten...</p>
        <small id="statusTime"></small>
      </section>

      <section class="card">
        <h2>Planning deze week</h2>
        <ul id="scheduleList" class="schedule-list"></ul>
      </section>

      <section class="card">
        <h2>Volgende date countdown</h2>
        <p id="countdownText">Countdown laden...</p>
      </section>
    </main>

    <footer>
      <p>Gemaakt met liefde ✨</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
